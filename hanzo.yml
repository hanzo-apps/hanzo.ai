# Canonical CI/CD config for hanzo-apps/hanzo.ai — read by the shared
# hanzoai/ci reusable workflow (.github/workflows/cicd.yml).
#
# hanzo.ai is a STATIC site (Next.js `output: export`). It ships to
# https://hanzo.ai via Cloudflare Pages in its OWN workflow (.github/workflows/
# deploy.yml, CF creds from KMS) — NOT a container image. So there is no
# `images:` build and no operator `deploy:` here: the prior
# `ghcr.io/hanzoai/cloud-site` image was vestigial (unused by the live site) and,
# because this repo lives in the hanzo-apps org, its GITHUB_TOKEN cannot push to
# the hanzoai GHCR namespace — the push failed `denied: permission_denied` every
# run. Dropped.
#
# What remains is the fast lint gate the reusable runs on every push + PR. The
# reusable treats `images:` as optional (hanzoai/ci#8) and provisions Node for the
# JS test gate on the bare arc runner (hanzoai/ci#9), so this run is green with no
# cross-org push attempt.
test:
  - name: lint
    run: |
      corepack enable
      corepack prepare pnpm@10.33.4 --activate
      pnpm install --frozen-lockfile
      pnpm lint
