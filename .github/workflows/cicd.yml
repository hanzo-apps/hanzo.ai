# Canonical CI/CD — imports the shared hanzoai/ci reusable workflow, which reads
# the repo-root hanzo.yml (images + test + deploy + kms). No per-repo build
# logic, no GitHub-hosted runners. All real config lives in hanzo.yml.
#
# `permissions` is REQUIRED here, not cosmetic: hanzoai/ci's build.yml requests
# `packages: write` (it pushes the image to GHCR with the automatic
# GITHUB_TOKEN). A reusable workflow can never hold more than its caller grants,
# and this org's default GITHUB_TOKEN is read-only — so without granting
# `packages: write` explicitly, GitHub rejects the call at compile time
# ("requesting 'packages: write', but is only allowed 'packages: read'") and the
# run startup-fails before any job launches. Granting the two scopes the
# reusable declares (contents:read + packages:write) is least-privilege and
# makes the caller portable across orgs regardless of their default-token policy.
#
# Deploy fires only on `main` per hanzo.yml; PRs build + test but never deploy.
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@main
    secrets: inherit
