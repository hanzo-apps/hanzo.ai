# Canonical CI/CD — imports the shared hanzoai/ci reusable workflow, which reads
# the repo-root hanzo.yml (images + test + deploy + kms). No per-repo build
# logic, no GitHub-hosted runners. Same ~7-line shape every hanzo/lux/zoo repo
# uses; all real config lives in hanzo.yml.
#
# The runner is intentionally NOT overridden here: hanzoai/ci already defaults
# its `runner` input to ["hanzo-build-linux-amd64"] (our arc scale set), so the
# default already targets the exact pool we want. Passing a `with:` block here
# is redundant and was the lone structural difference from every green caller
# (hanzoai/iam, hanzoai/commerce, …); dropping it restores the canonical shape.
# Deploy fires only on `main` per hanzo.yml; PRs build + test but never deploy.
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@main
    secrets: inherit
