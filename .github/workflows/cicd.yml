# Canonical CI/CD — imports the shared hanzoai/ci reusable workflow, which
# reads hanzo.yml (images + test + deploy + kms). No per-repo build logic, no
# GitHub-hosted runners. Same shape every hanzo/lux/zoo repo uses.
#
# Runner is pinned to the Hanzo arc scale set BY NAME (`hanzo-build-linux-amd64`):
# ARC scale sets are matched by installation name, not the [self-hosted,linux,
# amd64] label triple ci defaults to — without this the job sits queued.
#
# This replaces the bespoke ci.yml + deploy.yml. platform.hanzo.ai reads the
# SAME hanzo.yml, so a push can also build in-cluster (BuildKit → operator)
# with zero GHA dispatch once the repo's webhook is registered at
# platform.hanzo.ai — the fully GHA-free fast path.
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  cicd:
    uses: hanzoai/ci/.github/workflows/build.yml@main
    with:
      runner: '["hanzo-build-linux-amd64"]'
    secrets: inherit
