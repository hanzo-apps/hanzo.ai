name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

# Canonical, deterministic deploy: the shared reusable workflow builds the
# static export and ships it to Cloudflare Pages (project hanzo-ai). CF creds
# come from KMS via the org-level scoped cf-pages machine identity
# (KMS_CF_PAGES_CLIENT_ID/SECRET), inherited — zero per-repo secret config.
jobs:
  deploy:
    uses: hanzoai/universe/.github/workflows/reusable-deploy-cf-pages.yml@main
    with:
      project-name: hanzo-ai
      build-command: pnpm build
      output-dir: out
      node-version: '20'
    secrets: inherit
