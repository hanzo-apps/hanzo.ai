name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Large static export (hundreds of pages) — bump the heap so the build
      # doesn't OOM on the runner. Matches the Deploy workflow.
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
        timeout-minutes: 30
